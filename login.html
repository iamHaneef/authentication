<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional login page for authentication service">
    <title>Login - Authentication</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script defer src="script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-bg">
    <div class="box">
        <form name="form" onsubmit="return vfun()">
            <img src="../assets/user.png" class="user-icon" alt="User Icon">

            <h1>Welcome Back</h1>
            
            <div class="input-group">
                <p>Username</p>
                <input type="text" name="uname" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <p>Password</p>
                <input type="password" name="upw" placeholder="Enter your password" required>
            </div>

            <div id="error"></div>

            <input type="submit" value="Login">
            
            <div class="links">
                <a href="register.html">Don't have an account? Register</a>
            </div>
        </form>
    </div>
</body>
</html>
