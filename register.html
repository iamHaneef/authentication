<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional registration page for authentication service">
    <title>Register - Authentication</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script defer src="script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="register-bg">
    <div class="box">
        <form name="form2" onsubmit="return vfun2()">
            <img src="../assets/user.png" class="user-icon" alt="User Icon">

            <h1>Create Account</h1>
            
            <div class="input-group">
                <p>Username</p>
                <input type="text" name="uname" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <p>Email</p>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <p>Password</p>
                <input type="password" name="upw" placeholder="Create a password" required>
            </div>

            <div class="input-group">
                <p>Confirm Password</p>
                <input type="password" name="upw2" placeholder="Repeat your password" required>
            </div>

            <div id="error"></div>

            <input type="submit" value="Register">
            
            <div class="links">
                <a href="login.html">Already have an account? Login</a>
            </div>
        </form>
    </div>
</body>
</html>
